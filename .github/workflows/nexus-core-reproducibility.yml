name: nexus-core-reproducibility

on:
  push:
    paths:
      - '.nvmrc'
      - 'nexus-core/**'
      - '.github/workflows/nexus-core-reproducibility.yml'
  pull_request:
    paths:
      - '.nvmrc'
      - 'nexus-core/**'
      - '.github/workflows/nexus-core-reproducibility.yml'

jobs:
  reproducibility:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: nexus-core/package.json
      - name: Install dependencies
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi
      - run: npm run analyze
      - run: sha256sum analysis.json | awk '{print $1"  analysis.json"}' > analysis.sha256
      - name: Verify committed artifacts are reproducible
        run: |
          if ! git diff --exit-code -- analysis.json analysis.sha256; then
            echo "::error::analysis artifacts are not reproducible."
            git --no-pager diff -- analysis.json analysis.sha256
            exit 1
          fi
