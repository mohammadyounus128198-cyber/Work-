name: Allocator Safety Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  allocator-matrix-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: allocator-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
